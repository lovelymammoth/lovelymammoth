<a href="{{ .RelPermalink }}" class="card">
  <div class="card-image">
    {{ if .Params.image }}<img src="/{{ .Params.image }}" alt="{{ .Title }}">
    {{ else }}<div class="card-image-placeholder"></div>{{ end }}
  </div>
  <div class="card-meta">
    <div class="card-meta-top">
      <span class="card-num">{{ printf "%02d" .Params.weight }}</span>
      <span class="entry-year">{{ .Params.year }}</span>
    </div>
    <div class="entry-title">{{ .Title }}</div>
    {{ with .Params.subtitle }}<div class="entry-subtitle">{{ . }}</div>{{ end }}
    <div class="tag-row">
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
  </div>
</a>
